    category: "bugfix"
    difficulty: "easy"
    description: |
      当前后端允许创建或更新包含超过 9 首歌的歌单。
      请在 playlist service 中添加校验：创建和更新时 songs 数量不能超过 9。
      超出时返回 400，并包含错误消息：最多只能添加9首音乐。
      不要修改前端或小程序代码。
