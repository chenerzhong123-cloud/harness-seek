      - deathplaylist_backends/src/playlists/playlists.service.ts
    expected_changed_files:
      - deathplaylist_backends/src/playlists/playlists.service.ts
    allowed_changed_files:
      - deathplaylist_backends/src/playlists/playlists.service.ts
    forbidden_changed_files:
      - deathplaylist_frontend/**
      - deathplaylist_miniprogram/**
    business_invariants: |
      - 歌单 CRUD 基本功能不受影响
      - 创建 9 首歌以内的歌单仍应成功
      - 已有的 e2e 测试（eval-api）不应被破坏
